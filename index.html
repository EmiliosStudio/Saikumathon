<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saikumathon</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PANTALLA DE SELECCIÓN DE IDIOMA -->
    <div id="lang-screen">
        <div class="lang-box">
            <h1 class="start-title">Saikumathon</h1>
            <div class="lang-flags-row">
                <button class="lang-btn" id="btn-lang-es">
                    <img src="./assets/flags/es.png" alt="Español" class="flag-img">
                    <span class="lang-label-fit" data-langtext="Español">Español</span>
                </button>
                <button class="lang-btn" id="btn-lang-en">
                    <img src="./assets/flags/en.png" alt="English" class="flag-img">
                    <span class="lang-label-fit" data-langtext="English">English</span>
                </button>
            </div>
        </div>
    </div>

    <!-- PANTALLA DE INICIO -->
    <div id="start-screen" style="display:none">
        <div class="start-box">
            <h1 class="start-title">Saikumathon</h1>
            <p class="start-subtitle" data-i18n="subtitle"></p>
            <div class="mode-row">
                <button class="mode-btn" id="btn-sin-tiempo" data-i18n="sinTiempo"></button>
                <div class="con-tiempo-col">
                    <button class="mode-btn" id="btn-con-tiempo" data-i18n="conTiempo"></button>
                    <div id="time-options" class="time-options-disabled">
                        <div class="time-grid">
                            <button class="time-btn" data-time="60">1m</button>
                            <button class="time-btn" data-time="300">5m</button>
                            <button class="time-btn" data-time="600">10m</button>
                            <button class="time-btn" data-time="900">15m</button>
                            <button class="time-btn" data-time="1800">30m</button>
                            <button class="time-btn" data-time="3600">1h</button>
                        </div>
                        <div class="custom-time-row">
                            <span class="custom-time-label" data-i18n="tiempoPersonalizado"></span>
                            <input type="number" id="custom-time-input" min="1" max="60" placeholder="—">
                            <span class="custom-time-label">min</span>
                        </div>
                        <p class="inc-label" data-i18n="incremento"></p>
                        <div class="inc-row">
                            <span>0s</span>
                            <input type="range" id="increment-slider" min="0" max="15" value="0" step="1">
                            <span>15s</span>
                        </div>
                        <p id="inc-value">0s</p>
                    </div>
                </div>
            </div>
            <label class="rotate-label">
                <input type="checkbox" id="chk-rotate">
                <span data-i18n="girarTablero"></span>
            </label>
            <button id="btn-empezar" data-i18n="empezar"></button>
        </div>
    </div>

    <!-- JUEGO (oculto hasta empezar) -->
    <header id="game-header" style="display:none">
        <h1>Saikumathon</h1>
    </header>

    <main id="game-container" style="display:none">
        <div class="game-layout">
            <div class="timers-col">
                <div id="timer-negra" class="timer-box">0:00</div>
                <div class="side-controls">
                    <button class="ctrl-btn" id="btn-undo-top">&#8630;</button>
                    <button class="ctrl-btn" id="btn-play">&#9654;</button>
                    <button class="ctrl-btn ctrl-btn-text" id="btn-edit-time"></button>
                    <button class="ctrl-btn" id="btn-pause">&#9646;&#9646;</button>
                    <button class="ctrl-btn" id="btn-undo-bottom">&#8630;</button>
                </div>
                <div id="timer-blanca" class="timer-box">0:00</div>
            </div>

            <!-- Modal editar tiempo -->
            <div id="edit-time-modal" class="modal">
                <div class="modal-content edit-time-content">
                    <span class="close-modal" id="close-edit-time">&times;</span>
                    <h2 id="edit-time-modal-title" style="font-family:'Emiliosans';font-weight:normal;margin:0 0 16px"></h2>
                    <div class="edit-time-cols">
                        <div class="edit-col">
                            <p class="inc-label" data-i18n="tiempo"></p>
                            <div class="time-grid" id="edit-time-grid">
                                <button class="time-btn" data-time="60">1m</button>
                                <button class="time-btn" data-time="300">5m</button>
                                <button class="time-btn" data-time="600">10m</button>
                                <button class="time-btn" data-time="900">15m</button>
                                <button class="time-btn" data-time="1800">30m</button>
                                <button class="time-btn" data-time="3600">1h</button>
                            </div>
                            <div class="custom-time-row">
                                <span class="custom-time-label" data-i18n="personalizado"></span>
                                <input type="number" id="edit-custom-time-input" min="1" max="60" placeholder="—">
                                <span class="custom-time-label">min</span>
                            </div>
                        </div>
                        <div class="edit-col-divider"></div>
                        <div class="edit-col">
                            <p class="inc-label" data-i18n="incremento"></p>
                            <div class="inc-row">
                                <span>0s</span>
                                <input type="range" id="edit-increment-slider" min="0" max="15" value="0" step="1">
                                <span>15s</span>
                            </div>
                            <p id="edit-inc-value">0s</p>
                        </div>
                    </div>
                    <button id="btn-apply-time" data-i18n="aplicar"></button>
                    <button id="btn-quit-time" data-i18n="quitarTiempo"></button>
                    <p id="edit-time-error"></p>
                </div>
            </div>
            <div id="board-col">
                <div id="captured-negra" class="captured-row"></div>
                <div id="board"></div>
                <div id="captured-blanca" class="captured-row"></div>
            </div>
            <aside id="info-panel">
                <p id="welcome-text"></p>
                <p><br><em id="wip-text"></em></p>
            </aside>
        </div>
    </main>

    <footer class="footer" id="game-footer" style="display:none">
        <span>Emilio's Studio - 2026</span>
        <div class="button-group">
            <button id="open-how-to" data-i18n="comoMover"></button>
            <button id="open-change-lang" data-i18n="cambiarIdioma"></button>
            <button id="open-back-menu" data-i18n="volverMenu"></button>
            <button id="open-credits" data-i18n="creditos"></button>
            <button id="open-official-web" data-i18n="webOficial"></button>
        </div>
    </footer>

    <!-- Modal Cambiar idioma -->
    <div id="change-lang-modal" class="modal">
        <div class="modal-content change-lang-content">
            <span class="close-modal" id="close-change-lang">&times;</span>
            <h2 id="change-lang-title" style="font-family:'Emiliosans';font-weight:normal;margin:0 0 24px"></h2>
            <div class="lang-flags-row lang-flags-row-modal">
                <button class="lang-btn" id="modal-btn-lang-es">
                    <img src="./assets/flags/es.png" alt="Español" class="flag-img flag-img-modal">
                    <span class="lang-label-fit" data-langtext="Español">Español</span>
                </button>
                <button class="lang-btn" id="modal-btn-lang-en">
                    <img src="./assets/flags/en.png" alt="English" class="flag-img flag-img-modal">
                    <span class="lang-label-fit" data-langtext="English">English</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Volver al menú -->
    <div id="back-menu-modal" class="modal">
        <div class="modal-content back-menu-content">
            <span class="close-modal" id="close-back-menu">&times;</span>
            <p id="back-menu-msg" style="font-family:'Emiliosans';font-size:1.2em;color:white;margin:0 0 28px;line-height:1.5;text-align:center"></p>
            <div class="back-menu-btns">
                <button id="btn-confirm-back" class="back-menu-btn-red"></button>
                <button id="btn-cancel-back" class="back-menu-btn-white"></button>
            </div>
        </div>
    </div>

    <!-- Modal Créditos -->
    <div id="credits-modal" class="modal">
        <div class="modal-content credits-modal-content">
            <span class="close-modal" id="close-credits">&times;</span>
            <h2 id="credits-title"></h2>
            <hr>
            <div class="credits-list" id="credits-list"></div>
            <p class="credits-version">Versión 1.0</p>
        </div>
    </div>

    <!-- Modal Cómo mover -->
    <div id="how-to-modal" class="modal">
        <div class="modal-content pdf-modal-content">
            <span class="close-modal" id="close-how-to">&times;</span>
            <p id="pdf-error" style="display:none;color:#ff4d4d;font-family:sans-serif;font-size:0.9em;text-align:center;padding:10px;"></p>
            <canvas id="pdf-canvas"></canvas>
            <div class="pdf-nav">
                <button id="pdf-prev">&#8592;</button>
                <span id="pdf-page-info">1 / 1</span>
                <button id="pdf-next">&#8594;</button>
            </div>
        </div>
    </div>

    <!-- Modal Web Oficial -->
    <div id="official-web-modal" class="modal">
        <div class="modal-content">
            <h2 id="official-web-title"></h2>
            <p id="official-web-message"></p>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button id="btn-official-web-cancel" class="confirm-btn"></button>
                <button id="btn-official-web-continue" class="confirm-btn"></button>
            </div>
        </div>
    </div>

    <div id="gameover-modal" class="modal">
        <div class="modal-content gameover-content">
            <p id="gameover-msg"></p>
            <div class="gameover-btns">
                <button id="btn-gameover-menu" class="back-menu-btn-red"></button>
                <button id="btn-gameover-review" class="gameover-btn-normal"></button>
            </div>
        </div>
    </div>

    <!-- Modal Revisar partida -->
    <div id="review-modal" class="modal">
        <div class="modal-content review-content">
            <div class="review-main-row">
                <!-- Columna izquierda: tablero + capturadas + nav -->
                <div class="review-left-col">
                    <div id="review-captured-negra" class="captured-row review-captured-row"></div>
                    <div id="review-board" class="review-board"></div>
                    <div id="review-captured-blanca" class="captured-row review-captured-row"></div>
                    <div class="review-nav">
                        <button id="btn-review-prev" class="review-arrow-btn">&#8592;</button>
                        <span id="review-counter" class="review-counter-text"></span>
                        <button id="btn-review-next" class="review-arrow-btn">&#8594;</button>
                    </div>
                    <button id="btn-review-menu" class="back-menu-btn-red review-menu-btn"></button>
                </div>
                <!-- Columna derecha: historial de movimientos -->
                <div class="review-right-col">
                    <div id="review-move-list" class="review-move-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
